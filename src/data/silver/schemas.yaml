---
# Silver Layer - Consolidated Schemas
# All tables from the silver layer with silver prefix

tables:
  - table_name: silver_claim
    description: Claim Table from Europe 3
    columns:
      - name: SOURCE_SYSTEM
        type: string
        nullable: false
        primary_key: true
        description: Source system identifier for claim
      - name: CLAIM_ID
        type: string
        nullable: false
        primary_key: true
        description: Unique claim identifier
      - name: CONTRACT_SOURCE_SYSTEM
        type: string
        nullable: false
        primary_key: true
        description: Source system identifier for associated contract
      - name: CONTRACT_ID
        type: long
        nullable: false
        primary_key: true
        description: Associated contract identifier
      - name: CLAIM_TYPE
        type: long
        nullable: true
        description: Type classification of the claim
      - name: DATE_OF_LOSS
        type: date
        nullable: false
        description: Date when the loss occurred
      - name: AMOUNT
        type: decimal(16, 5)
        nullable: false
        description: Claim amount with precision of 16 digits and 5 decimal places
      - name: CREATION_DATE
        type: timestamp
        nullable: false
        description: Date and time when claim was created

  - table_name: silver_contract
    description: Contract Table from Europe 3
    columns:
      - name: SOURCE_SYSTEM
        type: string
        nullable: false
        primary_key: true
        description: Source system identifier
      - name: CONTRACT_ID
        type: long
        nullable: false
        primary_key: true
        description: Unique contract identifier
      - name: CONTRACT_TYPE
        type: string
        nullable: true
        description: Type of contract (Direct, Reinsurance, etc.)
      - name: INSURED_PERIOD_FROM
        type: date
        nullable: false
        description: Start date of insurance period
      - name: INSURED_PERIOD_TO
        type: date
        nullable: false
        description: End date of insurance period
      - name: CREATION_DATE
        type: timestamp
        nullable: false
        description: Date and time when contract was created

  - table_name: silver_transaction
    description: Output table schema for transformed/merged transactions
    notes:
      - Contract Source System defaults to "Europe 3" unless overridden
      - Contract Source System ID is taken from CONTRACT table CONTRACT_ID
      - Source System ID is derived by stripping non-digit prefix from CLAIM.CLAIM_ID
      - Transaction Type mapping: 2 -> "Corporate", 1 -> "Private", empty -> "Unknown"
      - Transaction Direction mapping by CLAIM_ID prefix - contains "CL" -> "COINSURANCE", contains "RX" -> "REINSURANCE"
      - NSE_ID is retrieved by calling external API and extracting the Digest field
    fields:
      - name: CONTRACT_SOURCE_SYSTEM
        type: string
        nullable: true
        metadata:
          primary_key: true
        source: Input from CLAIM.CONTRACT_SOURCE_SYSTEM with default "Europe 3"

      - name: CONTRACT_SOURCE_SYSTEM_ID
        type: long
        nullable: true
        metadata:
          primary_key: true
        source: CONTRACT.CONTRACT_ID via join on CONTRACT_SOURCE_SYSTEM and CONTRACT_ID

      - name: SOURCE_SYSTEM_ID
        type: integer
        nullable: true
        source: Derived from CLAIM.CLAIM_ID by removing non-digit prefix

      - name: TRANSACTION_TYPE
        type: string
        nullable: false
        source: Mapped from CLAIM.CLAIM_TYPE (2=Corporate, 1=Private, empty=Unknown)

      - name: TRANSACTION_DIRECTION
        type: string
        nullable: true
        source: Derived from CLAIM.CLAIM_ID prefix (contains CL=COINSURANCE, contains RX=REINSURANCE)

      - name: CONFORMED_VALUE
        type: decimal(16, 5)
        nullable: true
        source: CLAIM.AMOUNT

      - name: BUSINESS_DATE
        type: date
        nullable: true
        source: CLAIM.DATE_OF_LOSS mapped to YYYY-MM-DD

      - name: CREATION_DATE
        type: timestamp
        nullable: true
        source: CLAIM.CREATION_DATE mapped to YYYY-MM-DD HH:mm:ss

      - name: SYSTEM_TIMESTAMP
        type: timestamp
        nullable: true
        source: The date when the record is ingested (YYYY-MM-DD)

      - name: NSE_ID
        type: string
        nullable: false
        metadata:
          primary_key: true
        source: Derived by calling MD4 hash API with CLAIM_ID
